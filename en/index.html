<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSK432 Terminal</title>
    <style>
        :root {
            /* Base colors */
            --base-color-1: #252525;
            --base-color-2: #302c29;
            --base-color-3: #4a4a4a;

            /* Sub colors */
            --sub-color-1: #7a7671;
            --sub-color-2: #efebd6;
            --sub-color-3: #f6f5ee;

            /* Accent colors */
            --accent-color-1: #e3a19a;
            --accent-color-2: #527e88;

            /* Additional colors */
            --terminal-bg: rgba(10, 10, 10, 0.92);
            --terminal-text: #c1c1c1;
            --terminal-green: #6ebb9a;
            --terminal-yellow: #d6c760;
            --terminal-red: #d65f5f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background-color: var(--base-color-1);
            color: var(--sub-color-3);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--terminal-bg);
            z-index: 1000;
            color: var(--terminal-text);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 40px;
            overflow: hidden;
        }

        #loading-screen h1 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--terminal-text);
            letter-spacing: 2px;
        }

        .loading-item {
            margin: 6px 0;
            font-size: 0.9rem;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
            display: flex;
        }

        .loading-item-status {
            margin-left: 10px;
        }

        .status-green {
            color: var(--terminal-green);
        }

        .status-yellow {
            color: var(--terminal-yellow);
        }

        .status-red {
            color: var(--terminal-red);
        }

        .yorha-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            opacity: 0.1;
            color: var(--sub-color-3);
            font-weight: bold;
            letter-spacing: 10px;
            pointer-events: none;
        }

        /* Main Terminal */
        #terminal {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            background-color: var(--terminal-bg);
            color: var(--terminal-text);
            overflow-y: auto;
            font-size: 1rem;
            position: relative;
        }

        #terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--terminal-text);
        }

        #terminal-header h2 {
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        #terminal-status {
            font-size: 0.8rem;
        }

        #terminal-output {
            flex-grow: 1;
            margin-bottom: 20px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .terminal-line {
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .path {
            color: var(--accent-color-1);
        }

        .command {
            color: var(--sub-color-2);
        }

        .output-text {
            margin-top: 5px;
            margin-left: 20px;
        }

        .content-section {
            margin-left: 20px;
            margin-bottom: 20px;
        }

        .content-section h3 {
            margin-bottom: 10px;
            color: var(--accent-color-1);
            border-bottom: 1px solid var(--terminal-text);
            padding-bottom: 5px;
            width: fit-content;
        }

        .content-section p {
            margin-bottom: 10px;
            line-height: 1.5;
        }

        #terminal-input-line {
            display: flex;
            align-items: center;
        }

        #prompt {
            margin-right: 10px;
        }

        #current-path {
            color: var(--accent-color-1);
            margin-right: 5px;
        }

        #cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: var(--terminal-text);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        #terminal-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--terminal-text);
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            flex-grow: 1;
            caret-color: transparent;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes blink {

            0%,
            49% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0;
            }
        }

        /* Content styling */
        .project-item,
        .publication-item,
        .artwork-item,
        .blog-item {
            margin-bottom: 15px;
            padding-left: 15px;
            border-left: 2px solid var(--accent-color-2);
        }

        .project-item h4,
        .publication-item h4,
        .artwork-item h4,
        .blog-item h4 {
            color: var(--sub-color-2);
            margin-bottom: 5px;
        }

        .artwork-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .artwork-placeholder {
            background-color: var(--base-color-3);
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--sub-color-3);
            font-size: 0.8rem;
            border: 1px solid var(--sub-color-1);
        }

        .help-command {
            display: flex;
            margin-bottom: 8px;
        }

        .help-cmd {
            width: 120px;
            color: var(--accent-color-1);
        }

        /* Simple summary link */
        #simple-summary-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 0.8rem;
            z-index: 1100;
        }

        #simple-summary-link a {
            color: var(--accent-color-1);
            text-decoration: none;
        }

        /* Responsive design */
        @media (max-width: 768px) {

            #loading-screen,
            #terminal {
                padding: 15px;
            }

            .yorha-logo {
                font-size: 3rem;
            }

            .artwork-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>

                line.innerHTML = `<span class="path">${directory}</span> <span class="command">> ${command}</span>`;
            }

            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function processCommand(command) {
            const cmd = command.trim();
            const cmdLower = cmd.toLowerCase();
            const args = cmd.split(/\s+/);
            const argsLower = cmdLower.split(/\s+/);

            // Vim mode intercept
            if (isVimMode) {
                if (cmd === ':q' || cmd === ':q!' || cmd === ':wq') {
                    isVimMode = false;
                    addOutput("SYSTEM", "Exited vim. (You are one of the few who escaped.)", true);
                } else {
                    addOutput("SYSTEM", `-- INSERT -- (type :q to exit vim)`, true);
                }
                return;
            }

            // Quick keyword routing within publications directory
            if (currentDirectory && currentDirectory.toLowerCase().includes('publications')) {
                if (cmdLower.includes('floating caption')) {
                    addOutput("SYSTEM", 'Opening: Floating Captions (ETRA 2025)', true);
                    window.open('https://dl.acm.org/doi/10.1145/3715669.3726816', '_blank');
                    return;
                }
            }

            // Handle sudo prefix
            if (argsLower[0] === 'sudo') {
                if (argsLower[1] === 'su') {
                    isSudo = true;
                    document.getElementById('prompt').textContent = '#';
                    document.getElementById('current-path').style.color = 'var(--terminal-red)';
                    addOutput("SYSTEM", `root@ksk432-os:${currentDirectory}# Access granted. You are now root.\n\n⚠ WARNING: With great power comes great responsibility.\nType 'exit' to return to normal user mode.`, true);
                    return;
                }
                if (argsLower.length > 1) {
                    addOutput("SYSTEM", `[sudo] executing: ${args.slice(1).join(' ')}`, true);
                    const sudoCmd = args.slice(1).join(' ');
                    processCommand(sudoCmd);
                    return;
                }
                addOutput("SYSTEM", "Usage: sudo [command] or sudo su", true);
                return;
            }

            switch (argsLower[0]) {
                case 'help':
                    displayHelp();
                    break;
                case 'ls':
                    handleLs(argsLower.slice(1));
                    break;
                case 'cd':
                    changeDirectory(argsLower[1]);
                    break;
                case 'open':
                    openExternal(argsLower[1]);
                    break;
                case 'cat':
                    handleCat(args.slice(1).join(' '));
                    break;
                case 'pwd':
                    addOutput("SYSTEM", currentDirectory, true);
                    break;
                case 'whoami':
                    addOutput("SYSTEM", isSudo ? "root" : "operator@ksk432-os", true);
                    break;
                case 'echo':
                    addOutput("SYSTEM", args.slice(1).join(' ') || '', true);
                    break;
                case 'history':
                    handleHistory();
                    break;
                case 'tree':
                    handleTree();
                    break;
                case 'find':
                    handleFind(args.slice(1));
                    break;
                case 'grep':
                    handleGrep(args.slice(1));
                    break;
                case 'man':
                    handleMan(argsLower[1]);
                    break;
                case 'clear':
                    clearTerminal();
                    break;
                case 'home':
                    displayContent('home');
                    break;
                case 'about':
                    displayAbout();
                    break;
                case 'neofetch':
                    handleNeofetch();
                    break;
                case 'ssh':
                    handleSsh(argsLower[1]);
                    break;
                case 'vim':
                case 'nano':
                case 'vi':
                    handleVim(argsLower[0]);
                    break;
                case 'rm':
                    handleRm(cmd);
                    break;
                case 'chmod':
                    handleChmod(argsLower.slice(1));
                    break;
                case 'curl':
                    handleCurl(argsLower[1]);
                    break;
                case 'ping':
                    handlePing(argsLower[1]);
                    break;
                case 'date':
                    addOutput("SYSTEM", new Date().toString(), true);
                    break;
                case 'uname':
                    addOutput("SYSTEM", argsLower.includes('-a') ? "KSK432-OS 3.7.0 YoRHa-Kernel x86_64 GNU/Linux" : "KSK432-OS", true);
                    break;
                case 'touch':
                    addOutput("SYSTEM", `touch: cannot create '${args[1] || ''}': Read-only file system`, true);
                    break;
                case 'mkdir':
                    addOutput("SYSTEM", `mkdir: cannot create directory: Read-only file system`, true);
                    break;
                case 'exit':
                    if (isSudo) {
                        isSudo = false;
                        document.getElementById('prompt').textContent = '>';
                        document.getElementById('current-path').style.color = 'var(--accent-color-1)';
                        addOutput("SYSTEM", "Returned to normal user mode.", true);
                    } else {
                        simulateExit();
                    }
                    break;
                default:
                    if ([...rootDirs, 'skills'].includes(cmdLower)) {
                        displayContent(cmdLower);
                    } else {
                        addOutput("SYSTEM", `Command not recognized: ${cmd}. Type 'help' for available commands.`, true);
                    }
            }
        }

        function displayHelp() {
            let helpOutput = `Available commands:\n\n`;

            content.help.commands.forEach(cmd => {

            });

            helpOutput += `\nDirectories can also be accessed directly by typing their name.`;

            helpOutput += `\n\n<span style="color:var(--sub-color-1)">Hint: Experienced users may find that other commands work too...</span>`;

            addOutput("SYSTEM", helpOutput, true);

        function handleLs(flags) {
            const showAll = flags.some(f => f === '-a' || f === '-la' || f === '-al');
            const showLong = flags.some(f => f === '-l' || f === '-la' || f === '-al');
            const fsEntry = virtualFS[currentDirectory] || { files: [], hidden: [] };

            let dirs = [];
            let hiddenDirs = [];
            let files = fsEntry.files || [];
            let hiddenFiles = fsEntry.hidden || [];

            if (currentDirectory === '~') {
                dirs = visibleRootDirs;
                hiddenDirs = hiddenRootDirs;
            } else {
                const section = currentDirectory.replace('~/', '').split('/').pop();
                dirs = content[section]?.subdirs || subDirMap[section] || [];
                hiddenDirs = hiddenSubDirMap[section] || [];
            }

            if (showLong) {
                let output = `total ${dirs.length + files.length + (showAll ? hiddenDirs.length + hiddenFiles.length + 2 : 0)}\n`;
                const now = 'Feb 27 19:00';
                if (showAll) {
                    output += `drwxr-xr-x  2 operator operator 4096 ${now} <span style="color:var(--accent-color-2)">.  </span>\n`;
                    output += `drwxr-xr-x  2 operator operator 4096 ${now} <span style="color:var(--accent-color-2)">.. </span>\n`;
                }
                dirs.forEach(d => {
                    output += `drwxr-xr-x  2 operator operator 4096 ${now} <span style="color:var(--accent-color-2)">${d}/</span>\n`;
                });
                if (showAll) {
                    hiddenDirs.forEach(d => {
                        const name = d.endsWith('/') ? d : d + '/';
                        output += `drwx------  2 operator operator 4096 ${now} <span style="color:var(--terminal-yellow)">${name}</span>\n`;
                    });
                }
                files.forEach(f => {
                    output += `-rw-r--r--  1 operator operator  ${(fileContents[f]?.length || 128).toString().padStart(4)} ${now} ${f}\n`;
                });
                if (showAll) {
                    hiddenFiles.forEach(f => {
                        const name = f.endsWith('/') ? f : f;
                        output += `-rw-------  1 operator operator  ${(fileContents[name.replace('/', '')]?.length || 256).toString().padStart(4)} ${now} <span style="color:var(--terminal-yellow)">${name}</span>\n`;
                    });
                }
                if (currentDirectory === '~' && showAll && !gradesUnlocked) {
                    output += `-r--------  1 root     root      2048 ${now} <span style="color:var(--terminal-red)">grades (locked)</span>\n`;
                } else if (currentDirectory === '~' && showAll && gradesUnlocked) {
                    output += `drwxrwxrwx  1 operator operator  2048 ${now} <span style="color:var(--terminal-green)">grades/</span>\n`;
                }
                addOutput("SYSTEM", output, true);
            } else {
                let items = dirs.map(d => `<span style="color:var(--accent-color-2)">${d}/</span>`);
                if (showAll) {
                    items = items.concat(hiddenDirs.map(d => `<span style="color:var(--terminal-yellow)">${d.endsWith('/') ? d : d + '/'}</span>`));
                }
                items = items.concat(files);
                if (showAll) {
                    items = items.concat(hiddenFiles.map(f => `<span style="color:var(--terminal-yellow)">${f}</span>`));
                    if (currentDirectory === '~') {
                        items.push(gradesUnlocked ?
                            `<span style="color:var(--terminal-green)">grades/</span>` :
                            `<span style="color:var(--terminal-red)">grades (locked)</span>`);
                    }
                }
                if (items.length === 0) {
                    addOutput("SYSTEM", "(empty directory)", true);
                } else {
                    addOutput("SYSTEM", items.join('    '), true);
                }
            }
        }

        function changeDirectory(dir) {
            if (!dir) {
                addOutput("SYSTEM", "Usage: cd [directory]", true);
                return;
            }
            const directory = dir.toLowerCase();

            if (directory === '..') {
                if (currentDirectory === '~') {
                    addOutput("SYSTEM", "Already at root.", true);
                    return;
                }
                const parts = currentDirectory.split('/');
                parts.pop();
                currentDirectory = parts.join('/');
                document.getElementById('current-path').textContent = currentDirectory;
                return;
            }

            if (directory === '~' || directory === '/') {
                currentDirectory = '~';
                document.getElementById('current-path').textContent = currentDirectory;
                return;
            }

            // Handle grades specially
            if (directory === 'grades') {
                if (!gradesUnlocked && !isSudo) {
                    addOutput("SYSTEM", `cd: grades: Permission denied`, true);
                    return;
                }
                currentDirectory = '~/grades';
                document.getElementById('current-path').textContent = currentDirectory;
                displayContent('grades');
                return;
            }

            // All known dirs: visible + hidden + sub + hidden sub
            const allRootDirs = [...visibleRootDirs, ...hiddenRootDirs];

            if (currentDirectory === '~') {
                if (allRootDirs.includes(directory)) {
                    currentDirectory = `~/${directory}`;
                    document.getElementById('current-path').textContent = currentDirectory;
                    displayContent(directory);
                } else if ([...(subDirMap.projects || []), ...(hiddenSubDirMap.projects || [])].includes(directory)) {
                    currentDirectory = `~/projects/${directory}`;
                    document.getElementById('current-path').textContent = currentDirectory;
                    displayContent(directory);
                } else {
                    addOutput("SYSTEM", `Directory not found: ${directory}. Type 'ls' to list available directories.`, true);
                }
            } else {
                const parent = currentDirectory.replace('~/', '').split('/').pop();
                const subdirs = [...(content[parent]?.subdirs || subDirMap[parent] || []), ...(hiddenSubDirMap[parent] || [])];
                if (subdirs.includes(directory)) {
                    currentDirectory = `${currentDirectory}/${directory}`;
                    document.getElementById('current-path').textContent = currentDirectory;
                    displayContent(directory);
                } else {
                    addOutput("SYSTEM", `Directory not found: ${directory}. Type 'ls' to list available directories.`, true);
                }
            }
        }

                    output += `  ${key}\n`;

                addOutput("SYSTEM", output, true);

            const name = target.toLowerCase();
            if (externalLinks[name]) {

                addOutput("SYSTEM", `Unknown target: ${target}. Type 'open' to list available targets.`, true);
            }
        }

        function handleCat(filename) {

            const f = filename.trim();
            if (fileContents[f]) {
                addOutput("SYSTEM", fileContents[f], true);
            } else if (f === 'grades' && !gradesUnlocked && !isSudo) {
                addOutput("SYSTEM", "cat: grades: Permission denied", true);
            } else if (content[f]?.content) {

        function handleHistory() {
            let out = '';
            commandHistory.forEach((cmd, i) => { out += `  ${(i + 1).toString().padStart(4)}  ${cmd}\n`; });
            addOutput("SYSTEM", out || '(empty history)', true);

        function handleTree() {
            let out = '<span style="color:var(--accent-color-2)">.</span>\n';
            const drawDir = (path, prefix, name) => {
                const fs = virtualFS[path] || { files: [], hidden: [] };
                const subs = subDirMap[name] || content[name]?.subdirs || [];
                const hidSubs = hiddenSubDirMap[name] || [];
                const allItems = [...subs.map(s => ({ n: s + '/', dir: true })), ...hidSubs.map(s => ({ n: s + '/', dir: true, hid: true })), ...fs.files.map(f => ({ n: f })), ...fs.hidden.map(f => ({ n: f, hid: true }))];
                allItems.forEach((item, i) => {
                    const isLast = i === allItems.length - 1;
                    const connector = isLast ? '└── ' : '├── ';
                    const color = item.hid ? 'var(--terminal-yellow)' : item.dir ? 'var(--accent-color-2)' : 'var(--terminal-text)';
                    out += `${prefix}${connector}<span style="color:${color}">${item.n}</span>\n`;
                });
            };
            visibleRootDirs.forEach((d, i) => {
                const isLast = i === visibleRootDirs.length - 1;
                out += `${isLast ? '└── ' : '├── '}<span style="color:var(--accent-color-2)">${d}/</span>\n`;
                drawDir(`~/${d}`, isLast ? '    ' : '│   ', d);
            });
            addOutput("SYSTEM", out, true);
        }

        function handleFind(args) {
            let out = 'Search results:\n\n';
            let count = 0;
            const nameFilter = args.includes('-name') ? args[args.indexOf('-name') + 1]?.replace(/"/g, '') : null;
            Object.entries(virtualFS).forEach(([path, fs]) => {
                [...fs.files, ...fs.hidden].forEach(f => {
                    const fname = f.replace('/', '');
                    if (!nameFilter || fname.includes(nameFilter.replace('*', ''))) {
                        const color = f.startsWith('.') ? 'var(--terminal-yellow)' : 'var(--terminal-text)';
                        out += `<span style="color:${color}">${path}/${fname}</span>\n`;
                        count++;
                    }
                });
            });
            out += `\n${count} file(s) found.`;
            addOutput("SYSTEM", out, true);
        }

        function handleGrep(args) {
            if (!args.length) { addOutput("SYSTEM", "Usage: grep [pattern]", true); return; }
            const pattern = args[0].toLowerCase();
            let out = '';
            let count = 0;
            Object.entries(fileContents).forEach(([fname, fContent]) => {
                const lines = fContent.split('\\n');
                lines.forEach((line, i) => {
                    if (line.toLowerCase().includes(pattern)) {
                        const highlighted = line.replace(new RegExp(`(${pattern})`, 'gi'), '<span style="color:var(--terminal-red);font-weight:bold">$1</span>');
                        out += `<span style="color:var(--accent-color-2)">${fname}</span>:${i + 1}: ${highlighted}\n`;
                        count++;
                    }
                });
            });
            if (count === 0) out = `No matches found for "${pattern}".`;
            else out += `\n${count} match(es) found.`;
            addOutput("SYSTEM", out, true);
        }

        function handleRm(cmd) {

                            lines[i].style.textDecoration = 'line-through';
                            lines[i].style.opacity = '0.3';

        function handlePing(host) {
            if (!host) { addOutput("SYSTEM", "Usage: ping [host]", true); return; }
            addOutput("SYSTEM", `PING ${host} (${Math.floor(Math.random() * 223 + 1)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}): 56 data bytes`, true);
            let count = 0;
            const pingInterval = setInterval(() => {
                const time = (Math.random() * 50 + 5).toFixed(3);
                addOutput("SYSTEM", `64 bytes from ${host}: icmp_seq=${count} ttl=64 time=${time} ms`, true);
                count++;
                if (count >= 4) {
                    clearInterval(pingInterval);
                    addOutput("SYSTEM", `\n--- ${host} ping statistics ---\n4 packets transmitted, 4 received, 0% packet loss`, true);
                }
            }, 800);
        }

        function clearTerminal() {
            document.getElementById('terminal-output').innerHTML = '';
        }

        function displayContent(section) {
            // Handle hidden directories with virtual file content
            if (section === '.wip') {
                let out = '# <span style="color:var(--terminal-yellow)">Work In Progress</span>\n\n';
                out += '<span style="color:var(--sub-color-1)">⚠ CLASSIFIED — Unreleased projects</span>\n\n';
                wipProjects.forEach(p => {
                    out += `<div class="project-item"><h4>[${p.status}] ${p.title}</h4><p>${p.description}</p></div>`;
                });
                addOutput("SYSTEM", out, true);
                return;
            }
            if (section === '.ssh') {
                addOutput("SYSTEM", '# <span style="color:var(--terminal-yellow)">.ssh</span>\n\nFiles: authorized_keys  known_hosts\n\nUse \'cat authorized_keys\' or \'cat known_hosts\' to view.', true);
                return;
            }
            if (section === '.config') {
                addOutput("SYSTEM", '# <span style="color:var(--terminal-yellow)">.config</span>\n\nFiles: settings.json\n\nUse \'cat settings.json\' to view.', true);
                return;
            }
            if (section === 'grades' && !gradesUnlocked && !isSudo) {
                addOutput("SYSTEM", 'Permission denied: grades\nTry: chmod 777 grades', true);
                return;
            }

            if (!content[section]) {
                addOutput("SYSTEM", `Content not found: ${section}`, true);
                return;
            }

            let output = `# ${content[section].title}\n\n`;

            if (content[section].content) {
                output += content[section].content;
            } else if (section === 'projects') {
                output += 'ACTIVE PROJECTS:\n\n';
                content.projects.items.forEach(project => {
                    output += `<div class="project-item">
                        <h4>${project.title}</h4>
                        <p>${project.description}</p>
                    </div>`;
                });
            } else if (section === 'publications') {
                output += 'PUBLISHED WORKS:\n\n';
                content.publications.items.forEach(pub => {
                    let linksHtml = '';
                    if (pub.links && pub.links.length) {
                        const first = pub.links[0];
                        linksHtml = ` <span>- <a href="${first}" target=\"_blank\" rel=\"noopener\">link</a></span>`;
                    } else if (pub.doi) {
                        linksHtml = ` <span>- <a href=\"https://doi.org/${pub.doi}\" target=\"_blank\" rel=\"noopener\">doi</a></span>`;
                    }
                    output += `<div class="publication-item">
                        <h4>${pub.title} (${pub.year})</h4>
                        <p>Published in: ${pub.journal || ''}${linksHtml}</p>
                    </div>`;
                });
                output += `\nSee also: <a href=\"summary.html\" target=\"_blank\" rel=\"noopener\">Summary page</a>`;
            } else if (section === 'artwork') {
                output += `${content.artwork.description}\n\n`;
                output += `<div class="artwork-grid">
                    <div class="artwork-placeholder">Artwork 1</div>
                    <div class="artwork-placeholder">Artwork 2</div>
                    <div class="artwork-placeholder">Artwork 3</div>
                    <div class="artwork-placeholder">Artwork 4</div>
                    <div class="artwork-placeholder">Artwork 5</div>
                    <div class="artwork-placeholder">Artwork 6</div>
                </div>`;
            } else if (section === 'blog') {
                output += 'RECENT ENTRIES:\n\n';
                content.blog.items.forEach(post => {
                    const date = new Date(post.date);
                    const formattedDate = `${date.getDate().toString().padStart(2, '0')}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getFullYear()}`;

                    output += `<div class="blog-item">
                        <h4>${post.title}</h4>
                        <p>Date: ${formattedDate}</p>
                        <p>${post.excerpt}</p>
                    </div>`;
                });
            }

            // Auto-open target pages for specific project subpages
            if (section === 'binauralaudio') {
                setTimeout(() => { try { window.open('../research/binauralaudio/', '_blank'); } catch (e) { } }, 0);
            } else if (section === 'floating-captions') {
                setTimeout(() => { try { window.open('https://dl.acm.org/doi/10.1145/3715669.3726816', '_blank'); } catch (e) { } }, 0);
            }

            addOutput("SYSTEM", output, true);
        }

        function displayAbout() {
            const aboutText = `KSK432 Terminal OS v3.7
            
Developed for: [REDACTED]
Purpose: Information Management and Strategic Operations
Status: Fully Operational
            
This terminal provides secure access to classified information.
All interactions are logged and monitored.
            
For technical support, contact system administrator.`;

            addOutput("SYSTEM", aboutText, true);
        }

        function simulateExit() {
            addOutput("SYSTEM", "Logging out...", true);
            setTimeout(() => {
                addOutput("SYSTEM", "Session terminated.", true);
                setTimeout(() => {
                    window.location.reload();
                }, 1500);
            }, 1000);
        }

        // Start loading sequence
        window.onload = function () {
            displayLoadingItems();
        };
    </script>
    <div id="simple-summary-link"><a href="summary.html">Plain summary page</a> | <a href="../ja/summary.html">日本語</a>
    </div>
</body>
